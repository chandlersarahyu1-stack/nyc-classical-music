name: Fetch Events

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours (midnight, 6am, noon, 6pm UTC)
  workflow_dispatch:          # Allows you to run it manually from the GitHub Actions tab

permissions:
  contents: write             # Needed to commit events.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch events from Ticketmaster
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python fetch_events.py

      - name: Commit updated events.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add events.json
          if git diff --staged --quiet; then
            echo "No changes to events.json — skipping commit."
          else
            git commit -m "chore: update events data [skip ci]"
            git push
          fi


        - name: Commit updated events.json
          run: |
            git config user.email
  "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add events.json
            git commit -m "Update events data [skip
  ci]" --allow-empty
            git push
